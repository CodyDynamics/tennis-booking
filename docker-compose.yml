# API container only. Use an external Postgres (e.g. RDS) and optional Redis (ElastiCache or off).
#
# Env loading:
# - The Docker image does not include `.env` (see .dockerignore). The app reads `process.env` at runtime.
# - `env_file: .env` loads the repo-root `.env` into the container when you run Compose from this directory.
# - For ECS: set variables (or secrets) on the task definition — do not rely on a file inside the image.
#
# Local: docker compose up -d --build

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: booking-tennis-api
    env_file:
      - .env
    environment:
      # Host interpolation uses the same `.env` next to this file; values override duplicate keys from env_file.
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${API_HOST_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./apps/api/keys:/app/apps/api/keys
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(\"http\").get(\"http://127.0.0.1:\"+(process.env.PORT||3000)+\"/health\",(r)=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
