# API only (Docker). Postgres and Redis are not defined here — set `DB_*` / `REDIS_*` in `.env`
# (e.g. DB_HOST=host.docker.internal on Docker Desktop to use Postgres on your machine).
#
# Run from the directory that contains this file (repo root):
#   docker compose up -d --build
#
# Env: put `.env` next to this file. The `api` service uses `env_file: .env`. See comments in older
# revisions or docs for `${VAR:-default}` vs env_file behavior.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: booking-tennis-api
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: "3000"
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    volumes:
      - ./apps/api/keys:/app/apps/api/keys
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
